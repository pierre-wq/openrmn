<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>openRMN — Lab access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #FFFFFF;
  --bg-secondary: #F5F5F4;
  --text-primary: #1C1C1C;
  --text-secondary: #6B6B6B;
  --text-tertiary: #9B9B9B;
  --accent: #2752E7;
  --accent-hover: #6B82EE;
  --border: #D5D5D0;
  --error: #B0201C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-primary); color: var(--text-primary);
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body { display: flex; flex-direction: column; align-items: center; padding: 24px; }
.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
.wrap { width: 100%; max-width: 360px; }
.logo { font-family: "Source Serif 4", Georgia, serif; font-weight: 500; font-size: 18px; color: var(--text-primary); margin-bottom: 48px; text-align: left; }
h1 { font-family: "Source Serif 4", Georgia, serif; font-weight: 500; font-size: 28px; letter-spacing: -0.01em; margin-bottom: 10px; }
.sub { color: var(--text-secondary); font-size: 14px; line-height: 1.65; margin-bottom: 28px; }
form { display: flex; flex-direction: column; gap: 12px; }
input[type="password"] {
  width: 100%; padding: 12px 14px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-primary); color: var(--text-primary);
  font-family: inherit; outline: none;
}
input[type="password"]:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
button {
  width: 100%; padding: 12px 16px; font-size: 14px; font-weight: 500;
  background: var(--accent); color: #fff; border: 0; border-radius: 4px;
  cursor: pointer; font-family: inherit; transition: background 150ms;
}
button:hover { background: var(--accent-hover); }
button:disabled { background: var(--text-tertiary); cursor: not-allowed; }
.error { color: var(--error); font-size: 13px; min-height: 18px; margin-top: 4px; }
.page-footer {
  width: 100%; padding: 16px 0; margin-top: auto;
  color: var(--text-tertiary); font-size: 12px; text-align: center;
}
.page-footer a { color: var(--text-tertiary); text-decoration: none; }
.page-footer a:hover { color: var(--accent); text-decoration: underline; }
.page-footer .sep { margin: 0 8px; opacity: 0.6; }
</style>
</head>
<body>
<div class="main">
  <div class="wrap">
    <div class="logo">openRMN</div>
    <h1>Lab access</h1>
    <p class="sub">Private demo — enter the password you were given.</p>
    <form id="login-form" autocomplete="off">
      <input type="password" id="pw" placeholder="Password" autofocus required>
      <button type="submit" id="submit-btn">Enter →</button>
      <div class="error" id="err"></div>
    </form>
  </div>
</div>
<footer class="page-footer">
  openRMN<span class="sep">·</span>MIT license<span class="sep">·</span><a href="./how-it-works">How it works</a><span class="sep">·</span><a href="https://github.com/pierre-wq/openrmn" target="_blank" rel="noopener">GitHub</a><span class="sep">·</span>v0.5
</footer>
<script>
const form = document.getElementById("login-form");
const pw = document.getElementById("pw");
const err = document.getElementById("err");
const btn = document.getElementById("submit-btn");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  err.textContent = "";
  btn.disabled = true;
  try {
    const r = await fetch("./api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw.value }),
    });
    if (r.ok) {
      window.location.replace("./");
      return;
    }
    if (r.status === 401) {
      err.textContent = "Invalid password";
    } else {
      err.textContent = "Error " + r.status;
    }
  } catch (e) {
    err.textContent = "Network error: " + e.message;
  } finally {
    btn.disabled = false;
    pw.select();
  }
});
</script>
</body>
</html>
